services:
  postgres:
    image: postgres:16
    container_name: nutritrack-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nutritrack
      POSTGRES_USER: nutritrack
      POSTGRES_PASSWORD: nutritrack
    ports:
      - "5432:5432"
    volumes:
      - nutritrack-postgres-data:/var/lib/postgresql/data
      - ./server/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro

volumes:
  nutritrack-postgres-data:
